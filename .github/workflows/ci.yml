name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --filter @hoatrinh/web build:motd
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - run: bun run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://hoatrinh.dev' }}
      - run: bun run prerender
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://hoatrinh.dev' }}
      - run: bun run verify:ai-fetch
      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium
      - run: bun run e2e
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error

  deploy_preview:
    if: github.event_name == 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
      - name: Deploy preview to Cloudflare Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler@3 pages deploy dist \
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} \
            --branch=pr-${{ github.event.pull_request.number }}

  deploy_production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler@3 pages deploy dist \
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} \
            --branch=master

  crosspost:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [deploy_production]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run crosspost:devto
        env:
          DEV_TO_API_KEY: ${{ secrets.DEV_TO_API_KEY }}
          SITE_URL: ${{ vars.SITE_URL || 'https://hoatrinh.dev' }}
